<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Helmet Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>IoT Helmet Dashboard</h1>

<div class="cards">
  <div class="card" id="tempCard">Temperature: -- °C</div>
  <div class="card" id="humCard">Humidity: -- %</div>
  <div class="card" id="smokeCard">Smoke: --</div>
  <div class="card" id="proxCard">Proximity: --</div>
</div>

<canvas id="combinedChart"></canvas>

<div id="gemini-insights">Google Gemini AI Insights: Waiting for analysis...</div>

<button id="aiBtn">Run AI Analysis</button>

<script src="script.js"></script>
</body>
</html>
